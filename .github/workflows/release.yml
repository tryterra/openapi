name: Release and Bundle

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: data_models/package-lock.json

    - name: Install TypeSpec dependencies
      run: |
        cd data_models
        npm ci

    - name: Install Redocly CLI
      run: npm install -g @redocly/cli@1.34.2

    - name: Generate TypeSpec schemas
      run: |
        cd data_models
        npx tsp compile . --emit=@typespec/json-schema
        chmod +x promote.sh
        ./promote.sh

    - name: Bundle OpenAPI specifications
      run: |
        redocly bundle v5.yaml -o v5-bundled.yaml
        redocly bundle widget.yaml -o widget-bundled.yaml

    - name: Validate specifications
      run: |
        redocly lint
        redocly lint v5-bundled.yaml widget-bundled.yaml

    - name: Upload bundled specifications
      uses: actions/upload-artifact@v4
      with:
        name: bundled-specs
        path: |
          v5-bundled.yaml
          widget-bundled.yaml
        retention-days: 90

    - name: Upload schemas
      uses: actions/upload-artifact@v4
      with:
        name: schemas
        path: schemas/
        retention-days: 90

    - name: Create Release
      id: create_release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body: |
          ## Changes

          This release includes updated OpenAPI specifications and JSON schemas.

          ### Artifacts
          - `v5-bundled.yaml` - Bundled OpenAPI v5/v2 specification
          - `widget-bundled.yaml` - Bundled Widget API specification
          - `schemas.zip` - All generated JSON schemas

        draft: false
        prerelease: false

    - name: Upload Release Asset - v5 Bundle
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./v5-bundled.yaml
        asset_name: v5-bundled.yaml
        asset_content_type: application/yaml

    - name: Upload Release Asset - Widget Bundle
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./widget-bundled.yaml
        asset_name: widget-bundled.yaml
        asset_content_type: application/yaml
