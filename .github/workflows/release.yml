name: Release and Bundle

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: data_models/package-lock.json

    - name: Install TypeSpec dependencies
      run: |
        cd data_models
        npm ci

    - name: Install Redocly CLI
      run: npm install -g @redocly/cli@1.34.2

    - name: Generate TypeSpec schemas
      run: |
        cd data_models
        npx tsp compile . --emit=@typespec/json-schema
        chmod +x promote.sh
        ./promote.sh

    - name: Bundle OpenAPI specifications
      run: ./scripts/bundle-all.sh

    - name: Validate specifications
      run: |
        redocly lint
        redocly lint dist/*.yaml

    - name: Upload bundled specifications
      uses: actions/upload-artifact@v4
      with:
        name: bundled-specs
        path: dist/
        retention-days: 90

    - name: Upload schemas
      uses: actions/upload-artifact@v4
      with:
        name: schemas
        path: schemas/
        retention-days: 90
