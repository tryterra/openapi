name: Spec/Router Drift Check

# Weekly backstop: compares apis/v2.yaml's documented paths against the live v2 route
# inventory committed in terra-v6 (route_inventory.json, produced by that repo's
# route-inventory golden test). Fails — and opens an issue — only when the spec
# documents a path the router no longer serves. See analysis §8.3.

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch: {}

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Fetch terra-v6 route inventory
        env:
          # PAT with read access to the private terra-v6 repo.
          GH_TOKEN: ${{ secrets.TERRA_V6_RO_TOKEN }}
        run: |
          curl -sSfL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/tryterra/terra-v6/contents/services/api/internal/endpoints/v2/route_inventory.json?ref=main" \
            -o route_inventory.json
          echo "fetched $(python3 -c 'import json;print(len(json.load(open("route_inventory.json"))))') routes"

      - name: Check spec/router drift
        run: python3 scripts/check_spec_drift.py --spec apis/v2.yaml --inventory route_inventory.json

      - name: Open issue on drift
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Spec/router drift detected (apis/v2.yaml vs terra-v6 v2 routes)';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'spec-drift',
            });
            if (issues.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, labels: ['spec-drift'],
              body: 'The weekly drift check failed: apis/v2.yaml documents one or more paths the terra-v6 v2 router no longer serves. See the failed run logs for the list, then update apis/v2.yaml (remove/relocate) or the router.',
            });
