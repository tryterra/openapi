# Shared OpenAPI components referenced by every spec in apis/.
# Each API $refs these so the auth schemes and the RFC-7807 error contract are
# defined once and stay consistent across surfaces. redocly inlines them at
# bundle time, so the published bundles remain self-contained.
securitySchemes:
  ApiKeyAuth:
    type: apiKey
    in: header
    name: x-api-key
    description: Your API key for authentication
  DevID:
    type: apiKey
    in: header
    name: dev-id
    description: Your developer ID for authentication and tracking
  TerraClientId:
    type: apiKey
    in: header
    name: x-terra-client-id
    description: Your Terra client ID, used to authenticate v3 endpoints alongside x-terra-client-secret
  TerraClientSecret:
    type: apiKey
    in: header
    name: x-terra-client-secret
    description: Your Terra client secret, used to authenticate v3 endpoints alongside x-terra-client-id

schemas:
  Problem:
    type: object
    description: >
      An error response, following RFC 7807. Returned with
      `Content-Type: application/problem+json` on every 4xx/5xx response.
      The HTTP status line carries the status code; it is intentionally not
      repeated in the body. `type`, `title` and `instance` are always present;
      `detail` is included when a specific explanation is available.
    properties:
      type:
        type: string
        description: A URI reference identifying the problem type. Defaults to `about:blank`.
        example: about:blank
      title:
        type: string
        description: A short, human-readable summary of the problem type (the lowercased HTTP status text).
        example: unauthorized
      instance:
        type: string
        description: The request path, including any query string, that produced this problem.
        example: /api/v2/activity?user_id=d4aba475-f714-4663-88fe-28f18b8599b0&to_webhook=false
      detail:
        type: string
        description: A human-readable explanation specific to this occurrence of the problem.
        example: dev-id or x-api-key headers are missing
    required:
      - type
      - title
      - instance

responses:
  BadRequest:
    description: One or more parameters is malformed. The `detail` field describes the specific problem.
    content:
      application/problem+json:
        schema:
          $ref: "#/schemas/Problem"
        example:
          type: about:blank
          title: bad request
          instance: /activity
          detail: invalid start_date
  Unauthorized:
    description: Authentication credentials are missing or invalid.
    content:
      application/problem+json:
        schema:
          $ref: "#/schemas/Problem"
        example:
          type: about:blank
          title: unauthorized
          instance: /activity
          detail: dev-id or x-api-key headers are missing
  NotFound:
    description: A referenced resource does not exist on Terra's end.
    content:
      application/problem+json:
        schema:
          $ref: "#/schemas/Problem"
        example:
          type: about:blank
          title: not found
          instance: /activity
          detail: user not found
