$schema: https://json-schema.org/draft/2020-12/schema
type: object
properties:
  type:
    type: string
    const: athlete
  athlete:
    $ref: Athlete.yaml
    description: Athlete data
  user:
    $ref: TerraUser.yaml
    description: User whose data is being provided
  version:
    type: string
    description: API version
required:
  - type
  - athlete
  - user
  - version
allOf:
  - $ref: WebhookEvent.yaml
description: Athlete data event
