$schema: https://json-schema.org/draft/2020-12/schema
type: object
properties:
  activity:
    anyOf:
      - type: number
      - type: "null"
    examples:
      - 92
    minimum: 0
    maximum: 100
    description: Activity score for the given day.
  recovery:
    anyOf:
      - type: number
      - type: "null"
    examples:
      - 78
    minimum: 0
    maximum: 100
    description: Recovery score for the given day.
  sleep:
    anyOf:
      - type: number
      - type: "null"
    examples:
      - 85
    minimum: 0
    maximum: 100
    description: Sleep score for the given day, pertaining to the previous night's sleep.
  biological_age:
    anyOf:
      - type: number
      - type: "null"
    examples:
      - 27
    minimum: 0
    maximum: 100
    description: Biological age computed for the given day.
