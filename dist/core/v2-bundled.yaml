          schema:
            type: string
          required: true
        - name: start_date
          in: query
          description: Start date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: true
        - name: end_date
          in: query
          description: End date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: false
        - name: to_webhook
          in: query
          description: |
            Boolean flag specifying whether to send the data retrieved to the webhook instead of in the response (default: true if not provided)
          schema:
            type: boolean
          required: false
        - name: with_samples
          in: query
          description: |
            Boolean flag specifying whether to include detailed samples in the returned payload (default: false)
          schema:
            type: boolean
          required: false
      responses:
        '200':
          description: Returned upon successful data request
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/TerraUser'
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Body'
                      type:
                        type:
                          - string
                          - 'null'
                  - $ref: '#/components/schemas/DataSentToWebhook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /daily:
    get:
      summary: Retrieve daily activity summaries for a given user ID
      description: Fetches daily summaries of activity metrics such as steps, distance, calories burned etc. for a given user ID
      tags:
        - Daily
      operationId: Daily_Fetch
      parameters:
        - name: user_id
          in: query
          description: Terra user ID (UUID format) to retrieve data for
          schema:
            type: string
          required: true
        - name: start_date
          in: query
          description: Start date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: true
        - name: end_date
          in: query
          description: End date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: false
        - name: to_webhook
          in: query
          description: |
            Boolean flag specifying whether to send the data retrieved to the webhook instead of in the response (default: true if not provided)
          schema:
            type: boolean
          required: false
        - name: with_samples
          in: query
          description: |
            Boolean flag specifying whether to include detailed samples in the returned payload (default: false)
          schema:
            type: boolean
          required: false
      responses:
        '200':
          description: Returned upon successful data request
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/TerraUser'
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Daily'
                      type:
                        type:
                          - string
                          - 'null'
                  - $ref: '#/components/schemas/DataSentToWebhook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /menstruation:
    get:
      summary: Retrieve menstruation data for a given user ID
      description: Fetches menstruation data such as cycle length, period length, ovulation date etc. for a given user ID
      tags:
        - Menstruation
      operationId: Menstruation_Fetch
      parameters:
        - name: user_id
          in: query
          description: Terra user ID (UUID format) to retrieve data for
          schema:
            type: string
          required: true
        - name: start_date
          in: query
          description: Start date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: true
        - name: end_date
          in: query
          description: End date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: false
        - name: to_webhook
          in: query
          description: |
            Boolean flag specifying whether to send the data retrieved to the webhook instead of in the response (default: true if not provided)
          schema:
            type: boolean
          required: false
        - name: with_samples
          in: query
          description: |
            Boolean flag specifying whether to include detailed samples in the returned payload (default: false)
          schema:
            type: boolean
          required: false
      responses:
        '200':
          description: Returned upon successful data request
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/TerraUser'
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Menstruation'
                      type:
                        type:
                          - string
                          - 'null'
                  - $ref: '#/components/schemas/DataSentToWebhook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /nutrition:
    get:
      summary: Retrieve nutrition log data for a given user ID
      description: Fetches nutrition log data such as meal type, calories, macronutrients etc. for a given user ID
      tags:
        - Nutrition
      operationId: Nutrition_Fetch
      parameters:
        - name: user_id
          in: query
          description: Terra user ID (UUID format) to retrieve data for
          schema:
            type: string
          required: true
        - name: start_date
          in: query
          description: Start date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: true
        - name: end_date
          in: query
          description: End date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: false
        - name: to_webhook
          in: query
          description: |
            Boolean flag specifying whether to send the data retrieved to the webhook instead of in the response (default: true if not provided)
          schema:
            type: boolean
          required: false
        - name: with_samples
          in: query
          description: |
            Boolean flag specifying whether to include detailed samples in the returned payload (default: false)
          schema:
            type: boolean
          required: false
      responses:
        '200':
          description: Returned upon successful data request
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/TerraUser'
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Nutrition'
                      type:
                        type:
                          - string
                          - 'null'
                  - $ref: '#/components/schemas/DataSentToWebhook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /sleep:
    get:
      summary: Retrieve sleep sessions for a given user ID
      description: Fetches sleep data such as sleep duration, sleep stages, sleep quality etc. for a given user ID, for sleep sessions with a defined start and end time
      tags:
        - Sleep
      operationId: Sleep_Fetch
      parameters:
        - name: user_id
          in: query
          description: Terra user ID (UUID format) to retrieve data for
          schema:
            type: string
          required: true
        - name: start_date
          in: query
          description: Start date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: true
        - name: end_date
          in: query
          description: End date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
          schema:
            oneOf:
              - type: integer
              - type: string
                format: date
          required: false
        - name: to_webhook
          in: query
          description: |
            Boolean flag specifying whether to send the data retrieved to the webhook instead of in the response (default: true if not provided)
          schema:
            type: boolean
          required: false
        - name: with_samples
          in: query
          description: |
            Boolean flag specifying whether to include detailed samples in the returned payload (default: false)
          schema:
            type: boolean
          required: false
      responses:
        '200':
          description: Returned upon successful data request
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/TerraUser'
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Sleep'
                      type:
                        type:
                          - string
                          - 'null'
                  - $ref: '#/components/schemas/DataSentToWebhook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /workouts:
    post:
      tags:
        - Workouts
      summary: Create a workout template
      description: |
        Stores a reusable workout template. Plan it onto a user's calendar with `POST /workouts/{workout_id}/plan` — the template itself carries no date and is not pushed to any provider until planned.
      operationId: Workouts_CreateWorkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutTemplate'
      responses:
        '200':
          description: Template stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - success
                  workout_id:
                    type: string
                    example: '1024'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
        - Workouts
      summary: List workout templates
      description: Returns every workout template stored for your developer account.
      operationId: Workouts_ListWorkouts
      responses:
        '200':
          description: Stored templates, each including its workout_id
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutTemplate'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /workouts/{workout_id}:
    parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Workouts
      summary: Get a workout template
      operationId: Workouts_GetWorkout
      responses:
        '200':
          description: The stored template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutTemplate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Workouts
      summary: Delete a workout template
      description: |
        Deletes the template and cascades deletion of every planned workout created from it, including removal from connected providers.
      operationId: Workouts_DeleteWorkout
      responses:
        '204':
          description: Template and all planned instances deleted
        '207':
          description: |
            Some provider-side deletions failed; the template is retained. Retry to complete the cascade.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '424':
          description: Provider-side deletion could not be performed; retry later.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /workouts/{workout_id}/plan:
    post:
      tags:
        - Workouts
      summary: Plan a workout onto a user's calendar
      description: |
        Schedules the workout template for a user on a given date and pushes it to the user's connected provider (or queues it for SDK delivery). Athlete metrics personalise zone-based targets for this plan only.
      operationId: Workouts_PlanWorkout
      parameters:
        - name: workout_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: user_id
          in: query
          required: true
          description: Terra user ID of the connection to plan the workout for
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - planned_date
              properties:
                planned_date:
                  type: string
                  format: date
                  description: Date to schedule the workout on (YYYY-MM-DD)
                ftp:
                  type: number
                  description: Functional Threshold Power in watts
                max_heart_rate:
                  type: number
                  description: Maximum heart rate in BPM
                threshold_heart_rate:
                  type: number
                  description: Threshold heart rate in BPM
                threshold_speed:
                  type: number
                  description: Threshold speed in m/s
                pool_length_meters:
                  type: number
                  description: Pool length in meters (overrides the template value)
      responses:
        '201':
          description: Planned workout created and pushed (or queued for SDK delivery)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - success
                  planned_workout_id:
                    type: string
                    example: '2048'
                  provider_workout_id:
                    type: string
                    description: Identifier assigned by the provider. Absent for SDK-delivered plans.
                  coercion_warnings:
                    type: string
                    description: Set when the template could not be represented exactly on the provider.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '424':
          description: The provider rejected the workout push; retry later.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /plannedWorkouts:
    get:
      tags:
        - Workouts
      summary: List planned workouts for a user
      description: |
        Returns the user's planned workouts, including workouts created on the provider side (is_external true) where the provider exposes them.
      operationId: Workouts_ListPlannedWorkouts
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Planned workouts for the connection
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlannedWorkout'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /plannedWorkouts/{planned_workout_id}:
    parameters:
      - name: planned_workout_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: user_id
        in: query
        required: true
        schema:
          type: string
    get:
      tags:
        - Workouts
      summary: Get a planned workout
      operationId: Workouts_GetPlannedWorkout
      responses:
        '200':
          description: The planned workout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannedWorkoutSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Workouts
      summary: Reschedule a planned workout
      operationId: Workouts_UpdatePlannedWorkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - planned_date
              properties:
                planned_date:
                  type: string
                  format: date
                  description: New scheduled date (YYYY-MM-DD)
      responses:
        '200':
          description: Updated planned workout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannedWorkoutSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Workouts
      summary: Delete a planned workout
      description: Removes the planned workout from the user's calendar and from the connected provider.
      operationId: Workouts_DeletePlannedWorkout
      responses:
        '204':
          description: Planned workout deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /userInfo:
    get:
      tags:
        - User
      operationId: User_GetInfoForUserID
      description: Used to query for information on one Terra user ID, or to query for all registered Terra User objects under one reference ID
      summary: Get information for a single user ID or multiple users by reference ID
      parameters:
        - name: user_id
          in: query
          description: user ID to query for
          schema:
            type: string
          required: false
        - name: reference_id
          in: query
          description: reference ID to query for
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Returned when the provided resources are found
          content:
            application/json:
              schema:
                oneOf:
                  - description: User information for one connection (single User object)
                    type: object
                    properties:
                      user:
                        description: |
                          The connection. In addition to the base User fields, this endpoint also returns polling metadata.
                        allOf:
                          - $ref: '#/components/schemas/TerraUser'
                          - type: object
                            properties:
                              last_polled_at:
                                type:
                                  - string
                                  - 'null'
                                format: date-time
                                description: Last time Terra polled the provider for this connection.
                                example: '2024-01-20T11:00:00Z'
                              most_recent_data_at:
                                type:
                                  - string
                                  - 'null'
                                format: date-time
                                description: Timestamp of the most recent data point Terra holds for this connection.
                                example: '2024-01-19T23:00:00Z'
                      status:
                        type: string
                        enum:
                          - success
                          - error
                        default: success
                      is_authenticated:
                        type: boolean
                  - description: List of multiple User objects the reference_id is associated to
                    type: array
                    items:
                      $ref: '#/components/schemas/TerraUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /subscriptions:
    get:
      tags:
        - User
      operationId: User_GetAllUserIDs
      description: Used to query for information for all Terra User IDs. Supports optional pagination via `page` and `per_page`. If `page` is not provided, it returns all users in one go (backwards compatibility).
      summary: Get all Terra User IDs
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Zero-based page number. If omitted, results are not paginated.
          example: 0
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
          description: Number of results per page (default is 500).
          example: 500
      responses:
        '200':
          description: Returned upon a successful request
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/TerraUser'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          next:
                            type:
                              - integer
                              - 'null'
                            description: The next page number, or null if there is no next page
                          max_page:
                            type: integer
                            description: The maximum page index
                          results:
                            type: array
                            items:
                              $ref: '#/components/schemas/TerraUser'
        '400':
          $ref: '#/components/responses/BadRequest'
  /bulkUserInfo:
    post:
      tags:
        - User
      operationId: User_GetInfoForMultipleUserIDs
      description: Used to query for information for multiple Terra User IDs
      summary: Get information for multiple user IDs
      requestBody:
        content:
          application/json:
            schema:
              type: array
              description: List of user IDs to get information for
              items:
                type: string
        required: true
      responses:
        '200':
          description: Returned upon successful request
          content:
            application/json:
              schema:
                description: List of User objects
                type: array
                items:
                  $ref: '#/components/schemas/TerraUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /payload/resend:
    post:
      tags:
        - Webhooks
      operationId: Webhooks_ResendPayload
      summary: Resend a previously delivered webhook payload
      description: |
        Re-dispatches a stored normalised payload to your configured webhook
        destinations, identified by the original webhook event ID. The user
        and data type are read from the stored payload itself, so only the
        event ID is required.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - event_id
              properties:
                event_id:
                  type: string
                  description: ID of the original webhook event to resend (the `reference` field surfaced on the original delivery).
                  example: 5b04b6a4-09bd-4fc4-8bbb-6c44f0a2c0ef
        required: true
      responses:
        '200':
          description: Returned when the payload was successfully re-queued for delivery.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - success
                      - error
                    example: success
        '400':
          $ref: '#/components/responses/BadRequest'
  /integrations:
    get:
      summary: Get list of available integrations
      tags:
        - Integrations
      operationId: Integrations_Fetch
      description: Retrieve a list of all available provider integrations on the API.
      security: []
      responses:
        '200':
          description: Returns list of all available integrations on the API
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: string
                      example: FITBIT
                  sdk_providers:
                    type: array
                    description: Providers available through Terra's mobile SDKs rather than cloud connections
                    items:
                      type: string
                      example: APPLE
                  status:
                    enum:
                      - success
                      - error
                    type: string
                    default: success
  /integrations/detailed:
    get:
      tags:
        - Integrations
      operationId: Integrations_DetailedFetch
      summary: Get detailed list of integrations
      description: Retrieve a detailed list of supported integrations, optionally filtered by the developer's enabled integrations and the requirement for SDK usage.
      parameters:
        - in: query
          name: sdk
          required: false
          schema:
            type: boolean
          description: If `true`, allows SDK integrations to be included in the response.
      responses:
        '200':
          description: Successful response containing a list of integrations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationsResponse'
      security: []
webhooks:
  auth:
    post:
      description: Occurs when a user attempts to authenticate
      summary: User authentication webhook
      operationId: userAuthWebhook
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AuthSuccessEvent'
                - $ref: '#/components/schemas/AuthErrorEvent'
      responses:
        '200':
          description: Successful authentication response
  deauth:
    post:
      description: Occurs when a user deauthenticates through the Terra
      summary: User deauthentication webhook
      operationId: userDeauthWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeauthEvent'
      responses:
        '200':
          description: Successful deauthentication response
  user_reauth:
    post:
      description: Occurs when a user successfully authenticates for a second time, with the same account. You will receive a successful auth and a user_reauth payload
      summary: User reauthentication webhook
      operationId: userReauthWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserReauthEvent'
      responses:
        '200':
          description: Successful reauthentication response
  access_revoked:
    post:
      description: Occurs when a user revokes Terra's access from the provider's end
      summary: Access revoked webhook
      operationId: accessRevokedWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRevokedEvent'
      responses:
        '200':
          description: Successful access revocation response
  permission_change:
    post:
      description: Occurs when the set of permissions a user has granted changes on the provider side
      summary: Permission change webhook
      operationId: permissionChangeWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionChangeEvent'
      responses:
        '200':
          description: Successful permission change response
  connection_error:
    post:
      description: Occurs when a request to a provider returns an HTTP response of 401, 403 or 412
      summary: Connection error webhook
      operationId: connectionErrorWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionErrorEvent'
      responses:
        '200':
          description: Successful connection error response
  large_request_sending:
    post:
      description: Occurs when more than one month of data has been requested and all data has been successfully submitted
      summary: Large request sending webhook
      operationId: largeRequestSendingWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LargeRequestSendingEvent'
      responses:
        '200':
          description: Successful large request sending response
  large_request_processing:
    post:
      description: Occurs when more a request for over one month of data has been submitted to Terra. Data will be sent in chunks with the same reference field after this request. Each chunk will be at most 10 objects in the data field or 10 MB in size, whichever limit gets hit first
      summary: Large request processing webhook
      operationId: largeRequestProcessingWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LargeRequestProcessingEvent'
      responses:
        '200':
          description: Successful large request processing response
  s3_upload:
    post:
      description: Data event sent as a download link.
      summary: S3 upload webhook
      operationId: s3UploadWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/S3PayloadEvent'
      responses:
        '200':
          description: Successful S3 upload response
  activity:
    post:
      description: 'activity data event: activity updates when new activity is completed'
      summary: Activity webhook
      operationId: activityWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityEvent'
      responses:
        '200':
          description: Successful activity response
  athlete:
    post:
      description: 'athlete data event: Occurs throughout the day as users use their wearables.'
      summary: Athlete webhook
      operationId: athleteWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AthleteEvent'
      responses:
        '200':
          description: Successful athlete response
  nutrition:
    post:
      description: 'nutrition data event: occurs throughout the day as users use their wearables.'
      summary: Nutrition webhook
      operationId: nutritionWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NutritionEvent'
      responses:
        '200':
          description: Successful nutrition response
  daily:
    post:
      description: 'daily data event: occurs throughout the day as users use their wearables.'
      summary: Daily webhook
      operationId: dailyWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyEvent'
      responses:
        '200':
          description: Successful daily response
  sleep:
    post:
      description: 'sleep data event: occurs throughout the day as users use their wearables.'
      summary: Sleep webhook
      operationId: sleepWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SleepEvent'
      responses:
        '200':
          description: Successful sleep response
  menstruation:
    post:
      description: 'menstruation data event: occurs throughout the day as users use their wearables.'
      summary: Menstruation webhook
      operationId: menstruationWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenstruationEvent'
      responses:
        '200':
          description: Successful menstruation response
  body:
    post:
      description: 'body data event: occurs throughout the day as users use their wearables.'
      summary: Body webhook
      operationId: bodyWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BodyEvent'
      responses:
        '200':
          description: Successful body response
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Your API key for authentication
    DevID:
      type: apiKey
      in: header
      name: dev-id
      description: Your developer ID for authentication and tracking
  responses:
    BadRequest:
      description: One or more parameters is malformed. The `detail` field describes the specific problem.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: about:blank
            title: bad request
            instance: /activity
            detail: invalid start_date
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: about:blank
            title: unauthorized
            instance: /activity
            detail: dev-id or x-api-key headers are missing
    NotFound:
      description: A referenced resource does not exist on Terra's end.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: about:blank
            title: not found
            instance: /activity
            detail: user not found
  schemas:
    WorkoutTemplate:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        name:
          type: string
          description: Name of the workout
        description:
          anyOf:
            - type: string
            - type: 'null'
          description: Description of the workout
        sport:
          $ref: '#/components/schemas/WorkoutSport'
        environment:
          anyOf:
            - $ref: '#/components/schemas/EnvironmentType'
            - type: 'null'
        pool_length_meters:
          anyOf:
            - type: number
            - type: 'null'
          description: Pool length in meters, for swim workouts
        step_blocks:
          type: array
          items:
            $ref: '#/components/schemas/StepBlock'
        estimated_duration_seconds:
          anyOf:
            - type: number
            - type: 'null'
          description: Estimated total duration in seconds
        estimated_distance_meters:
          anyOf:
            - type: number
            - type: 'null'
          description: Estimated total distance in meters
        estimated_calories:
          anyOf:
            - type: number
            - type: 'null'
          description: Estimated calories burned
        workout_id:
          anyOf:
            - type: string
            - type: 'null'
          description: Terra identifier of the stored template. Set by Terra in responses; ignored on create.
      required:
        - name
        - sport
        - step_blocks
      description: A reusable workout template, created once and planned onto user calendars
    PlannedWorkoutItem:
      $ref: '#/components/schemas/PlannedWorkout'
    PlannedWorkoutSummary:
      type: object
      description: Summary of a planned workout, returned by the get and reschedule operations.
      properties:
        planned_workout_id:
          type: string
          example: '2048'
        planned_date:
          type: string
          format: date
        is_external:
          type: boolean
          description: True when the workout was created on the provider side rather than through Terra.
        workout_id:
          type: string
          description: Identifier of the source template. Absent for external workouts.
        provider_workout_id:
          type: string
          description: Identifier assigned by the provider, once pushed.
        coercion_warnings:
          type: string
          description: Set when the template could not be represented exactly on the provider.
    Problem:
      type: object
      description: |
        An error response, following RFC 9457 (Problem Details for HTTP APIs, which obsoletes RFC 7807). Returned with `Content-Type: application/problem+json` on every 4xx/5xx response. The HTTP status line carries the status code; it is intentionally not repeated in the body. `type`, `title` and `instance` are always present; `detail` is included when a specific explanation is available.
      properties:
        type:
          type: string
          description: A URI reference identifying the problem type. Defaults to `about:blank`.
          example: about:blank
        title:
          type: string
          description: A short, human-readable summary of the problem type (the lowercased HTTP status text).
          example: unauthorized
        instance:
          type: string
          description: The request path, including any query string, that produced this problem.
          example: /api/v2/activity?user_id=d4aba475-f714-4663-88fe-28f18b8599b0&to_webhook=false
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: dev-id or x-api-key headers are missing
      required:
        - type
        - title
        - instance
    WidgetSessionParams:
      type: object
      properties:
        providers:
          type: string
          description: Comma separated list of providers to display on the device selection page. This overrides your selected sources on your dashboard
          example: GARMIN,FITBIT,OURA,WITHINGS,SUUNTO
        language:
          type: string
          description: Display language of the widget
          example: en
        reference_id:
          type: string
          description: Identifier of the end user on your system, such as a user ID or email associated with them
          example: user123@email.com
        auth_success_redirect_url:
          type: string
          description: URL the user is redirected to upon successful authentication
          example: https://myapp.com/success
        auth_failure_redirect_url:
          type: string
          description: URL the user is redirected to upon unsuccessful authentication
          example: https://myapp.com/failure
    User:
      $ref: '#/components/schemas/TerraUser'
    DataSentToWebhook:
      type: object
      description: |
        Acknowledgement returned when `to_webhook` is true (the default): the requested data is fetched asynchronously and delivered to your configured destination, and this body confirms the request was accepted.
      properties:
        status:
          type: string
          enum:
            - success
          example: success
        type:
          type: string
          description: The data type that was requested (e.g. `activity`, `sleep`).
          example: activity
        reference:
          type: string
          description: Payload reference, tying this request to the webhook payload you will receive.
          example: 5a3c2540-7139-44c6-8158-f81196e2cf2e
        trace_id:
          type: string
          description: Trace identifier for this request (equal to `reference`).
          example: 5a3c2540-7139-44c6-8158-f81196e2cf2e
        message:
          type: string
          description: Present only for large requests (date range over one month), which are delivered in chunks.
          example: Large request submitted. The data is being processed and will be sent to your destination in chunks
        user:
          type: object
          description: Summary of the connection the data was requested for.
          properties:
            user_id:
              type: string
              example: 5a3c2540-7139-44c6-8158-f81196e2cf2e
            provider:
              type: string
              example: GARMIN
            reference_id:
              type:
                - string
                - 'null'
              example: user123@email.com
            created_at:
              type: string
              format: date-time
              example: '2024-01-15T09:30:00Z'
            active:
              type: boolean
              example: true
            scopes:
              type: string
              description: Comma-separated list of granted scopes.
              example: activity,sleep,daily
            last_webhook_update:
              type:
                - string
                - 'null'
              format: date-time
              example: '2024-01-20T11:00:00Z'
    Activity:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        active_durations_data:
          anyOf:
            - $ref: '#/components/schemas/ActiveDurationsData'
            - type: 'null'
          description: Number of minutes spent at various intensities during the workout, as reported by the Fitness Data provider.
        calories_data:
          anyOf:
            - $ref: '#/components/schemas/CaloriesData'
            - type: 'null'
          description: Object containing calorie-related information for the user during the specific workout.
        cheat_detection:
          anyOf:
            - type: number
            - type: 'null'
          examples:
            - 0
          description: Cheat detection flag.
        data_enrichment:
          anyOf:
            - $ref: '#/components/schemas/DataEnrichment'
            - type: 'null'
          description: Object containing Terra Scores.
        device_data:
          anyOf:
            - $ref: '#/components/schemas/DeviceData'
            - type: 'null'
          description: Object containing information on the device which recorded the specific workout.
        distance_data:
          anyOf:
            - $ref: '#/components/schemas/DistanceData'
            - type: 'null'
          description: Object containing information related to distance covered during the associated workout.
        energy_data:
          anyOf:
            - $ref: '#/components/schemas/EnergyData'
            - type: 'null'
          description: Object containing information on the energy expended by the user during the workout.
        heart_rate_data:
          anyOf:
            - $ref: '#/components/schemas/HeartRateData'
            - type: 'null'
          description: Object containing heartrate-related information for the workout.
        lap_data:
          anyOf:
            - $ref: '#/components/schemas/LapData'
            - type: 'null'
          description: Object containing information on data for each lap performed by the user - mostly relates to track & field running activities, and swimming activities.
        MET_data:
          anyOf:
            - $ref: '#/components/schemas/METData'
            - type: 'null'
          description: Object containing information on the Metabolic Equivalent of Task for the workout.
        metadata:
          $ref: '#/components/schemas/ActivityMetadata'
          description: Object containing workout metadata.
        movement_data:
          anyOf:
            - $ref: '#/components/schemas/MovementData'
            - type: 'null'
          description: Object containing information on the user's movement throughout the workout.
        oxygen_data:
          anyOf:
            - $ref: '#/components/schemas/OxygenData'
            - type: 'null'
          description: Object containing information on oxygen-related metrics for the workout.
        polyline_map_data:
          anyOf:
            - $ref: '#/components/schemas/PolylineMapData'
            - type: 'null'
          description: Object containing polyline-representation map data, plotting the user's trajectory throughout the workout.
        position_data:
          anyOf:
            - $ref: '#/components/schemas/PositionData'
            - type: 'null'
          description: Object containing information on the user's position throughout the workout.
        power_data:
          anyOf:
            - $ref: '#/components/schemas/PowerData'
            - type: 'null'
          description: Object containing information on the power generated by the user during the workout.
        strain_data:
          anyOf:
            - $ref: '#/components/schemas/StrainData'
            - type: 'null'
          description: Object containing information on the cardiovascular strain imposed on the user during the workout.
        TSS_data:
          anyOf:
            - $ref: '#/components/schemas/TSSData'
            - type: 'null'
          description: Object containing information on the stress put on the user's body from a workout.
        work_data:
          anyOf:
            - $ref: '#/components/schemas/WorkData'
            - type: 'null'
          description: Object containing information on the work output of the user during the workout.
      required:
        - metadata
    Athlete:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        age:
          anyOf:
            - type: integer
            - type: 'null'
          examples:
            - 28
          description: User's age.
        country:
          anyOf:
            - type: string
            - type: 'null'
          examples:
            - United States
          description: User's country of residence.
        bio:
          anyOf:
            - type: string
            - type: 'null'
          examples:
            - Passionate runner and cyclist
          description: User's bio - a short description they display on their profile.
        state:
          anyOf:
            - type: string
            - type: 'null'
          examples:
            - California
          description: User's state of residence.
        last_name:
          anyOf:
            - type: string
            - type: 'null'
          examples:
            - Smith
          description: User's last name.
        sex:
          anyOf:
            - type: string
            - type: 'null'
          examples:
            - male
          description: User's sex.
        city:
          anyOf:
            - type: string
            - type: 'null'
          examples:
            - San Francisco
          description: User's city of residence.
        email:
          anyOf:
